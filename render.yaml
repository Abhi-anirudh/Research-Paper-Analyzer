services:
  - type: web
    name: research-paper-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

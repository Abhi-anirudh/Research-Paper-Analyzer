<div class="upload-container">
  <div
    class="dropzone"
    [class.drag-over]="isDragOver"
    [class.uploading]="isUploading"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    (click)="fileInput.click()"
    id="dropzone"
  >
    <input
      #fileInput
      type="file"
      accept=".pdf"
      (change)="onFileSelected($event)"
      hidden
      id="file-input"
    />

    <div class="dropzone-content" *ngIf="!isUploading">
      <div class="upload-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <h3>Upload Research Paper</h3>
      <p>Drag & drop your PDF here or <span class="browse-link">browse files</span></p>
      <p class="file-hint">Supports PDF format • Max 50MB</p>
    </div>

    <div class="upload-progress" *ngIf="isUploading">
      <div class="progress-ring">
        <svg viewBox="0 0 100 100">
          <circle class="progress-bg" cx="50" cy="50" r="42"/>
          <circle
            class="progress-fill"
            cx="50" cy="50" r="42"
            [style.stroke-dashoffset]="264 - (264 * uploadProgress / 100)"
          />
        </svg>
        <span class="progress-text">{{ uploadProgress | number:'1.0-0' }}%</span>
      </div>
      <p class="processing-text">Processing paper...</p>
      <p class="processing-sub">Extracting text • Building embeddings • Indexing</p>
    </div>
  </div>

  <div class="error-message" *ngIf="errorMessage" id="upload-error">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="15" y1="9" x2="9" y2="15"/>
      <line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    {{ errorMessage }}
  </div>
</div>

<div class="sections-container">
  <!-- Paper info card -->
  <div class="paper-info" *ngIf="paperId">
    <h3 class="paper-title">{{ paperTitle || 'Research Paper' }}</h3>
    <div class="paper-meta">
      <span *ngIf="paperAuthors.length">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        {{ paperAuthors.join(', ') }}
      </span>
      <span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        {{ totalPages }} pages
      </span>
      <span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        {{ numChunks }} chunks indexed
      </span>
    </div>
  </div>

  <!-- Section list -->
  <div class="section-list">
    <h4 class="section-heading">Sections</h4>

    <div class="skeleton-list" *ngIf="isLoading">
      <div class="skeleton-item" *ngFor="let s of [1,2,3,4,5]"></div>
    </div>

    <div class="no-sections" *ngIf="!isLoading && sections.length === 0">
      <p>No sections detected</p>
    </div>

    <div
      *ngFor="let section of sections"
      class="section-item"
      [class.active]="activeSection === section.title"
      (click)="selectSection(section.title)"
    >
      <div class="section-header" (click)="toggleExpand(section.title); $event.stopPropagation()">
        <span class="section-name">{{ section.title }}</span>
        <span class="section-pages">p.{{ section.page_numbers.join(',') }}</span>
      </div>
      <div class="section-preview" *ngIf="expandedSection === section.title">
        {{ truncateText(section.text, 300) }}
      </div>
    </div>
  </div>
</div>

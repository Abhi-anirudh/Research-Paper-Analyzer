version: '3.9'

services:
  backend:
    build: ./backend
    container_name: rpa-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_MODEL=gemini-2.0-flash
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - SIMILARITY_THRESHOLD=0.3
      - TOP_K=5
      - DATA_DIR=/app/data
    volumes:
      - paper_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: rpa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  paper_data:
    driver: local
